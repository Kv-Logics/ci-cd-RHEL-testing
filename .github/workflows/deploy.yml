name: Auto Deploy to Red Hat Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Runs directly on your Red Hat server via the self-hosted runner
    runs-on: self-hosted
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy application via Docker Compose
        run: |
          echo "Rebuilding and restarting Docker containers locally on RHEL..."
          docker compose down
          docker compose up --build -d
          # Verify running container
          echo "Current running containers:"
          docker ps --filter "name=rhel-ci-cd-demo"
